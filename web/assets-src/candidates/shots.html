<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:#f0f0f0}model-viewer{width:700px;height:700px;background:#f0f0f0}</style>
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
</head>
<body>
<model-viewer id="mv" exposure="1" interaction-prompt="none" shadow-intensity="0"></model-viewer>
<script>
const q = new URLSearchParams(location.search);
const mv = document.getElementById('mv');
mv.src = q.get('src');
mv.cameraOrbit = q.get('orbit') || '0deg 87deg 105%';
if (q.get('target')) mv.cameraTarget = q.get('target');
if (q.get('fov')) mv.fieldOfView = q.get('fov');
window.loaded = false;
mv.addEventListener('load', () => { setTimeout(() => { window.loaded = true; }, 600); });
mv.addEventListener('error', (e) => { window.loadError = String(e.detail && e.detail.sourceError || e.type); });
</script>
</body>
</html>
